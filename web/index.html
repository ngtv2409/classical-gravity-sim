<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
<body>

<div id="sim-area">

<div id="sim-title">
    <h1>N-Bodies Gravitation Simulation</h1>
</div>

<canvas id="sim-cv"></canvas>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-hdr">
            <h3>import simulation</h3>
            <button id="modal-import-x">X</button>
        </div>

        <div class="modal-other-btns">
            <button id="modal-import-json">Import from JSON file</button>
            <input type="file" id="import-filejson" accept=".json,application/json" hidden>
        </div>

        <textarea id="json-text" type="text"></textarea>

        <div class="modal-btns">
            <button id="modal-import-close">close</button>
            <button id="modal-import-ok">ok</button>
        </div>
    </div>
</div>

<div id="sim-ctl">
    <h1>Control Panel</h1>
    <div id="sim-ctl-btns">
        <button id="sim-start">Start</button>
        <button id="sim-reset">Reset</button>
        <button id="sim-body-add">Add</button>
        <button id="sim-import">Import</button>
        <button id="sim-export">Export</button>
    </div>
    <details id="dis-settings">
        <summary>Display Settings</summary>
        <label>
            <input type="checkbox" id="cfg-show-lab" value="no" checked>
            Show label
        </label>
        <label>
            <input type="checkbox" id="cfg-show-grid" value="no" checked>
            Show grid
        </label>
        <label>
            <input type="checkbox" id="cfg-show-coord" value="no" checked>
            Show coordinate
        </label>
        <div class="field">
            <label>Time Scale</label>
            <input id="cfg-timescale" type="number" value="2592000">
        </div>
    </details>
    <details id="sim-settings">
        <summary>Simulation Settings</summary>

        <div class="field">
            <label>Time Step (DT) - Advanced !!</label>
            <input id="cfg-dt" type="number" value="3600">
        </div>

        <div class="field">
            <label>Softening (epsilon)</label>
            <input id="cfg-eps" type="number" step="0.001" value="0.01">
        </div>

    </details>
    <div id="body-panel"></div>
</div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
